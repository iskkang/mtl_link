name: FESCO Sync

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours UTC
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  orders-sync:
    name: Sync FESCO orders
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Split into two batches to stay under Cloudflare's 100s proxy timeout.
      # 421 orders / 10 per page = 43 pages; batch 1 covers pages 0–20 (~45s), batch 2 covers pages 21–42 (~45s).
      - name: Orders sync batch 1 (startOffset=0, limit=210)
        run: |
          response=$(curl -sS -X POST -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/fesco/sync?startOffset=0&limit=210")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json
          if [ "$response" != "200" ]; then
            echo "Orders sync batch 1 failed"
            exit 1
          fi
      - name: Orders sync batch 2 (startOffset=210)
        run: |
          response=$(curl -sS -X POST -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/fesco/sync?startOffset=210")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json
          if [ "$response" != "200" ]; then
            echo "Orders sync batch 2 failed"
            exit 1
          fi

  container-tracking-sync:
    name: Sync FESCO container tracking
    runs-on: ubuntu-latest
    needs: orders-sync
    timeout-minutes: 10
    steps:
      # Split into two batches of 72 to stay under Cloudflare's 100s proxy timeout.
      # Containers are sorted alphabetically before slicing so batches are stable.
      - name: Container tracking batch 1 (offset=0, limit=72)
        run: |
          response=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/fesco/container-tracking-sync?limit=72")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json
          if [ "$response" != "200" ]; then
            echo "Batch 1 failed"
            exit 1
          fi
      - name: Container tracking batch 2 (offset=72, limit=72)
        run: |
          response=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/fesco/container-tracking-sync?limit=72&offset=72")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json
          if [ "$response" != "200" ]; then
            echo "Batch 2 failed"
            exit 1
          fi
